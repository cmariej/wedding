<button class="burger" (click)="toggleMenu()">
    <span [class.open]="menuOpen"></span>
    <span [class.open]="menuOpen"></span>
    <span [class.open]="menuOpen"></span>
</button>

<div class="navbar" [class.open]="menuOpen">
    <a routerLink="/general" class="text" routerLinkActive="active" (click)="closeMenu()">Allgemeines</a>
    <a routerLink="/countdown" class="text" routerLinkActive="active" (click)="closeMenu()">Countdown</a>
    <a routerLink="/location" class="text" routerLinkActive="active" (click)="closeMenu()">Veranstaltungsort</a>
    <a routerLink="/agenda" class="text" routerLinkActive="active" (click)="closeMenu()">Agenda</a>

    <!-- DETAILS -->
    <div class="nav-dropdown"
        (mouseenter)="onDesktopEnter()"
        (mouseleave)="onDesktopLeave()">
        
        <a class="text"
        routerLink="/details"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: false}"
        (click)="closeMenu()">
            Details
        </a>

        <div class="dropdown-menu">
            <a routerLink="/details" class="dropdown-item" routerLinkActive="active" 
            [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Allgemeines</a>
            <a routerLink="/details/menu" class="dropdown-item" routerLinkActive="active" 
            [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Menü</a>
            <a routerLink="/details/faq" class="dropdown-item" routerLinkActive="active" 
            [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">FAQ</a>
        </div>
    </div>

    <a routerLink="/rsvp" class="text" routerLinkActive="active" (click)="closeMenu()">Zusage</a>
</div>
