<div class="main-container">
    <div class="heading-container">
        <div class="heading-img">
            <img src="/assets/img/leaves-4.png">
            <img src="/assets/img/leaves-2.png">
            <img src="/assets/img/leaves-3.png">
        </div>
        <div class="overlay-title">
            <p class="title">unser</p>
            <p class="subtitle">Countdown</p>
        </div>
    </div>
    <p>zur Ewigkeit hat begonnen…</p>
    <div class="countdown">
        <div class="countdown-unit">
            <span>{{ days() }}</span>
            <small>Tage</small>
        </div>
        <span class="colon">:</span>
        <div class="countdown-unit">
            <span>{{ hours() }}</span>
            <small>Stunden</small>
        </div>
        <span class="colon">:</span>
        <div class="countdown-unit">
            <span>{{ minutes() }}</span>
            <small>Minuten</small>
        </div>
        <span class="colon seconds">:</span>
        <div class="countdown-unit seconds">
            <span>{{ seconds() }}</span>
            <small>Sekunden</small>
        </div>
        </div>
    <img src="/assets/img/joy-heart.png">
</div>
