<div class="main-container">
    <div class="heading-container">
        <div class="heading-img">
            <img src="assets/img/leaves-4.png">
            <img src="assets/img/leaves-2.png">
            <img src="assets/img/leaves-3.png">
        </div>
        <div class="overlay-title">
            <p class="title">unser</p>
            <p class="subtitle">Menü</p>
        </div>
    </div>
    <div class="menu">
        <h2>Kaffee & Kuchen</h2>
        @for (item of afternoon; track item;) {
            <p>{{ item }}</p>
        }
    </div>
    <div class="menu">
        <h2>Abendessen</h2>
        @for (item of dinner; track item;) {
            <p>{{ item }}</p>
        }
    </div>
    <div class="menu">
        <h2>Snacks</h2>
        @for (item of snacks; track item;) {
            <p>{{ item }}</p>
        }
    </div>
    <div class="menu">
        <h2>Getränke</h2>
        @for (item of drinks; track item;) {
            <p>{{ item }}</p>
        }
    </div>
    <h1 style="padding: 2rem 0;">Guten Appetit!</h1>
</div>
