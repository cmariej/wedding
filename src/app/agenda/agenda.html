<div class="main-container">
    <div class="heading-container">
        <div class="heading-img">
            <img src="/assets/img/leaves-4.png">
            <img src="/assets/img/leaves-2.png">
            <img src="/assets/img/leaves-3.png">
        </div>
        <div class="overlay-title">
            <p class="title">Hochzeits-</p>
            <p class="subtitle">Agenda</p>
        </div>
    </div>
    <div class="agenda-wrapper">
        <div class="agenda">
            @for (item of items; track item.time; let first = $first; let last = $last) {
                <div class="agenda-item">

                <div class="agenda-icon">
                    <img [src]="item.icon" [alt]="item.title" />
                </div>

                <div class="agenda-line">
                    <div class="agenda-dot-top" [class.invisible]="first"></div>
                    <img class="agenda-dot-img" src="/assets/img/dot.png" alt="dot" />
                    <div class="agenda-dot-bottom" [class.invisible]="last"></div>
                </div>

                <div class="agenda-content">
                    <p class="agenda-time">{{ item.time }}</p>
                    <p class="agenda-title">{{ item.title }}</p>
                </div>

                </div>
            }
        </div>
    </div>
</div>
